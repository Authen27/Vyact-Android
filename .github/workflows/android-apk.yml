name: Android Debug APK

# Produces an installable debug APK as a downloadable artifact.
# Run it from the GitHub UI (Actions tab -> "Run workflow") or on push to main.
on:
  workflow_dispatch: {}
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      # Plugins must be present BEFORE the web build — main.tsx/native.ts/auth.ts
      # import @capacitor/{core,app,browser}, so tsc needs them to type-check.
      - name: Install Capacitor + plugins
        run: |
          npm install @capacitor/core@latest @capacitor/android@latest @capacitor/app@latest @capacitor/browser@latest @capacitor/splash-screen@latest @capacitor/local-notifications@latest
          npm install -D @capacitor/cli@latest

      - name: Build web bundle (Vite -> dist/)
        run: npm run build

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # First run scaffolds the native android/ project; subsequent runs reuse it.
      - name: Add Capacitor Android platform (if missing)
        run: if [ ! -d android ]; then npx cap add android; fi

      - name: Sync web assets into native project
        run: npx cap sync android

      - name: Patch AndroidManifest for OAuth deep link
        run: node scripts/patch-android-manifest.mjs

      - name: Generate launcher icon + splash (pip)
        run: |
          npm i -D @capacitor/assets@latest sharp@latest
          node scripts/gen-assets.mjs
          npx capacitor-assets generate --android --assetPath assets

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vyact-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

  # Boots a real Android emulator, installs the APK, launches it, and proves it
  # actually runs (not just builds). Captures logcat + a screenshot as artifacts,
  # and FAILS if the app crashes on launch or the WebView can't load its assets.
  smoke-test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Enable KVM (hardware accel for the emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: vyact-debug-apk
          path: .

      - name: Boot emulator, install, launch, capture logs
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -no-snapshot -noaudio -no-boot-anim -gpu swiftshader_indirect
          disable-animations: true
          script: |
            adb install -r app-debug.apk
            adb shell pm grant com.vyact.consumer android.permission.POST_NOTIFICATIONS || true
            adb logcat -c
            adb shell monkey -p com.vyact.consumer -c android.intent.category.LAUNCHER 1
            sleep 30
            adb exec-out screencap -p > smoke-screenshot.png
            adb logcat -d > logcat.txt
            adb shell pidof com.vyact.consumer || { echo "FAIL: app process not running (crashed on launch)"; tail -n 150 logcat.txt; exit 1; }
            if grep -Eq "FATAL EXCEPTION|FATAL SIGNAL|AndroidRuntime: FATAL" logcat.txt; then echo "FAIL: fatal native crash"; tail -n 150 logcat.txt; exit 1; fi
            if grep -Eq "Unable to open asset URL: https://localhost/assets/" logcat.txt; then echo "FAIL: app bundle asset failed to load (white-screen)"; tail -n 80 logcat.txt; exit 1; fi
            if grep -Eq "js\.error|Uncaught Error" logcat.txt; then echo "FAIL: uncaught JS error during boot (app likely blank)"; grep -E "Uncaught|js\.error|Capacitor/Console" logcat.txt | tail -n 30; exit 1; fi
            echo "SMOKE OK: launched, process alive, no native crash, no uncaught JS error"

      - name: Upload smoke logs + screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vyact-smoke-logs
          path: |
            logcat.txt
            smoke-screenshot.png
          if-no-files-found: warn
          retention-days: 14

  # Builds the app in LOCAL-ONLY mode (`vite build --mode test` => cloud disabled,
  # so it boots straight to the dashboard with no auth screen) and screenshots the
  # app chrome, so the safe-area header/footer fix can be verified visually.
  ui-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Capacitor + plugins
        run: |
          npm install @capacitor/core@latest @capacitor/android@latest @capacitor/app@latest @capacitor/browser@latest @capacitor/splash-screen@latest @capacitor/local-notifications@latest
          npm install -D @capacitor/cli@latest

      - name: Build web bundle (LOCAL-ONLY — boots to dashboard)
        run: npx vite build --mode test

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - name: Add Capacitor Android platform (if missing)
        run: if [ ! -d android ]; then npx cap add android; fi

      - run: npx cap sync android

      - run: node scripts/patch-android-manifest.mjs

      - name: Generate launcher icon + splash (pip)
        run: |
          npm i -D @capacitor/assets@latest sharp@latest
          node scripts/gen-assets.mjs
          npx capacitor-assets generate --android --assetPath assets

      - name: Build debug APK (local-only)
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Boot emulator + screenshot app chrome
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -no-snapshot -noaudio -no-boot-anim -gpu swiftshader_indirect
          disable-animations: true
          script: |
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            adb shell pm grant com.vyact.consumer android.permission.POST_NOTIFICATIONS || true
            adb shell monkey -p com.vyact.consumer -c android.intent.category.LAUNCHER 1
            sleep 2
            adb exec-out screencap -p > ui-launch.png
            sleep 33
            adb exec-out screencap -p > ui-dashboard.png
            adb shell cmd statusbar expand-notifications || true
            sleep 2
            adb exec-out screencap -p > ui-notifications.png
            adb shell cmd statusbar collapse || true
            adb shell input tap 70 130
            sleep 3
            adb exec-out screencap -p > ui-drawer.png

      - name: Upload UI screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vyact-ui-validation
          path: |
            ui-launch.png
            ui-dashboard.png
            ui-notifications.png
            ui-drawer.png
          if-no-files-found: warn
          retention-days: 14
