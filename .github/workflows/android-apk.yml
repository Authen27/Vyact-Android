name: Android Debug APK

# Produces an installable debug APK as a downloadable artifact.
# Run it from the GitHub UI (Actions tab -> "Run workflow") or on push to main.
on:
  workflow_dispatch: {}
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Build web bundle (Vite -> dist/)
        run: npm run build

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # First run scaffolds the native android/ project; subsequent runs reuse it.
      - name: Ensure Capacitor Android platform
        run: |
          npm install @capacitor/core@latest
          npm install -D @capacitor/cli@latest
          npm install @capacitor/android@latest
          if [ ! -d android ]; then npx cap add android; fi

      - name: Sync web assets into native project
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vyact-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
