name: Android Debug APK

# Produces an installable debug APK as a downloadable artifact.
# Run it from the GitHub UI (Actions tab -> "Run workflow") or on push to main.
on:
  workflow_dispatch: {}
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Build web bundle (Vite -> dist/)
        run: npm run build

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # First run scaffolds the native android/ project; subsequent runs reuse it.
      - name: Ensure Capacitor Android platform
        run: |
          npm install @capacitor/core@latest
          npm install -D @capacitor/cli@latest
          npm install @capacitor/android@latest
          if [ ! -d android ]; then npx cap add android; fi

      - name: Sync web assets into native project
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vyact-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

  # Boots a real Android emulator, installs the APK, launches it, and proves it
  # actually runs (not just builds). Captures logcat + a screenshot as artifacts,
  # and FAILS if the app crashes on launch or the WebView can't load its assets.
  smoke-test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Enable KVM (hardware accel for the emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: vyact-debug-apk
          path: .

      - name: Boot emulator, install, launch, capture logs
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -no-snapshot -noaudio -no-boot-anim -gpu swiftshader_indirect
          disable-animations: true
          script: |
            adb install -r app-debug.apk
            adb logcat -c
            adb shell monkey -p com.vyact.consumer -c android.intent.category.LAUNCHER 1
            sleep 30
            adb exec-out screencap -p > smoke-screenshot.png
            adb logcat -d > logcat.txt
            adb shell pidof com.vyact.consumer || { echo "FAIL: app process not running (crashed on launch)"; tail -n 150 logcat.txt; exit 1; }
            if grep -Eq "FATAL EXCEPTION|FATAL SIGNAL|AndroidRuntime: FATAL" logcat.txt; then echo "FAIL: fatal native crash"; tail -n 150 logcat.txt; exit 1; fi
            if grep -Eq "net::ERR_|ERR_FILE_NOT_FOUND|Unable to open asset" logcat.txt; then echo "FAIL: WebView could not load its assets"; exit 1; fi
            if grep -Eq "js\.error|Uncaught Error" logcat.txt; then echo "FAIL: uncaught JS error during boot (app likely blank)"; grep -E "Uncaught|js\.error|Capacitor/Console" logcat.txt | tail -n 30; exit 1; fi
            echo "SMOKE OK: launched, process alive, no native crash, no uncaught JS error"

      - name: Upload smoke logs + screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vyact-smoke-logs
          path: |
            logcat.txt
            smoke-screenshot.png
          if-no-files-found: warn
          retention-days: 14
