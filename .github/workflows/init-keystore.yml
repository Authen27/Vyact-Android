name: Init upload keystore

# ONE-TIME: mints the Play upload keystore in CI (this host has no local JDK).
# Prereq: set repo secrets KEY_ALIAS, KEYSTORE_PASSWORD, KEY_PASSWORD first.
# After it runs: download the artifact, SAVE upload.keystore somewhere safe, and
# paste keystore.base64.txt into a new secret KEYSTORE_BASE64. Then run
# "Android Release AAB" to get the signed bundle.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  keygen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Generate upload keystore
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEY_ALIAS" ] || [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "::error::Set KEY_ALIAS, KEYSTORE_PASSWORD and KEY_PASSWORD secrets first."; exit 1
          fi
          keytool -genkeypair -v \
            -keystore upload.keystore -alias "$KEY_ALIAS" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$KEYSTORE_PASSWORD" -keypass "$KEY_PASSWORD" \
            -dname "CN=Vyact, OU=Mobile, O=Vyact, C=IN"
          base64 -w0 upload.keystore > keystore.base64.txt
          echo "Keystore generated. SHA-256 fingerprint:"
          keytool -list -v -keystore upload.keystore -alias "$KEY_ALIAS" -storepass "$KEYSTORE_PASSWORD" | grep -A1 "SHA256:"

      - name: Upload keystore artifact (KEEP THIS SAFE)
        uses: actions/upload-artifact@v4
        with:
          name: vyact-upload-keystore
          path: |
            upload.keystore
            keystore.base64.txt
          retention-days: 1
